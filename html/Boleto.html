<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestionar Boletos</title>
    <link rel="stylesheet" href="../css/admin_common.css">
    <link rel="icon" type="image/png" sizes="32x32" href="../Data/img/iconoApp.png">
</head>
<body>

    <button type="button" class="btn-fondo"></button>

    <form id="boletoForm">
        <h1>Agregar Boleto</h1>
        <div class="form-group">
            <label>ID:</label>
            <label id="boletoId"></label>
        </div>
        <div class="form-group">
            <label>Precio:</label>
            <input type="number" id="boletoPrecio" required>
        </div>
        <div class="form-group">
            <label>Color:</label>
            <select id="selectcolor" required></select>
        </div>
        <div class="form-group">
            <label>Grada:</label>
            <select id="selectgrada" required></select>
        </div>
        <div class="form-group">
            <label>GP:</label>
            <select id="selectgp" required></select>
        </div>
        <button type="submit">Agregar Boleto</button>
    </form>

    <div class="poop">
        <div class="poop-content">
            <h2>¿DESEA SALIR DE ESTA VENTANA?</h2>
            <button id="yes">SI</button>
            <button id="no">NO</button>
        </div>
    </div>

    <h2 style="text-align:center;">Boletos registrados</h2>
    <table id="boletoTable">
        <thead><tr><th>ID</th><th>Precio</th><th>Color</th><th>Grada</th><th>GP</th>/tr></thead>
        <tbody></tbody>
    </table>

    <script type="module" src="../js/Boletos.js"></script>
</body>
</html>
