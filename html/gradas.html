<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestionar Gradas</title>
    <link rel="stylesheet" href="../css/admin_common.css">
    <link rel="icon" type="image/png" sizes="32x32" href="../Data/img/iconoApp.png">
</head>
<body>

    <button type="button" class="btn-fondo"></button>

    <form id="gradaForm">
        <h1>Agregar Grada</h1>
        <div class="form-group">
            <label>ID:</label>
            <input type="number" id="gradaId" readonly style="background:#eee;">
        </div>
        <div class="form-group">
            <label>Nombre de la Grada:</label>
            <input type="text" id="name_grada" required>
        </div>
        <button type="submit">Agregar Grada</button>
    </form>

    <div class="poop">
        <div class="poop-content">
            <h2>¿DESEA SALIR DE ESTA VENTANA?</h2>
            <button id="yes">SI</button>
            <button id="no">NO</button>
        </div>
    </div>

    <h2 style="text-align:center;">Gradas registradas</h2>
    <table id="gradaTable">
        <thead><tr><th>ID</th><th>Grada</th></tr></thead>
        <tbody></tbody>
    </table>

    <script type="module" src="../js/gradas.js"></script>
</body>
</html>
