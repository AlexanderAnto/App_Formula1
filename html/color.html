<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agregar Color</title>
    <link rel="stylesheet" href="../css/admin_common.css">
    <link rel="icon" type="image/png" sizes="32x32" href="../Data/img/iconoApp.png">
</head>
<body>

    <button type="button" class="btn-fondo"></button>

    <form class="color-form" id="colorForm">
        <h1>Agregar Color</h1>
        <div class="form-group">
            <label>ID:</label>
            <label id="colorId"></label>
        </div>
        <div class="form-group">
            <label>Color:</label>
            <input type="text" id="colorInput" required>
        </div>
        <button type="submit" id="addColor">Agregar</button>
    </form>

    <div class="poop">
        <div class="poop-content">
            <h2>¿DESEA SALIR DE ESTA VENTANA?</h2>
            <button id="yes">SI</button>
            <button id="no">NO</button>
        </div>
    </div>

    <hr>

    <h2 style="text-align:center; margin-top:20px;">Colores registrados</h2>

    <table id="colorTable">
        <thead>
            <tr><th>ID</th><th>Color</th></tr>
        </thead>
        <tbody></tbody>
    </table>

    <script type="module" src="../js/color.js"></script>
</body>
</html>
